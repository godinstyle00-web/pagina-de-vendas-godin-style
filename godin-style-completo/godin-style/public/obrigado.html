<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Godin Style — Pedido Confirmado</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"DM Sans",sans-serif;background:#f5f5f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:20px;padding:48px 36px;text-align:center;max-width:480px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.08)}
.icon{font-size:72px;margin-bottom:20px}
h1{font-family:"Playfair Display",serif;font-size:28px;margin-bottom:12px;color:#0d0d0d}
p{color:#5a5a5a;font-size:15px;line-height:1.7;margin-bottom:8px}
.status-badge{display:inline-block;padding:6px 20px;border-radius:20px;font-size:13px;font-weight:500;margin-bottom:20px}
.aprovado{background:#e8f5e9;color:#1a6b3a}
.pendente{background:#fff8e1;color:#f57f17}
.falhou{background:#ffebee;color:#b00020}
.btn{display:inline-block;background:#1565c0;color:#fff;padding:14px 32px;border-radius:26px;font-family:"DM Sans",sans-serif;font-size:15px;font-weight:500;text-decoration:none;margin-top:24px;cursor:pointer;border:none}
.btn:hover{background:#1e88e5}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="icon" id="icon">⏳</div>
  <h1 id="title">Processando...</h1>
  <div class="status-badge" id="badge"></div>
  <p id="msg"></p>
  <a href="/" class="btn">Voltar para a loja</a>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const status = params.get("status") || "pendente";
const map = {
  aprovado: {icon:"🎉", title:"Pedido Confirmado!", badge:"✅ Pagamento Aprovado", cls:"aprovado", msg:"Obrigado pela sua compra na Godin Style! Você receberá um e-mail de confirmação em breve com os detalhes do pedido."},
  pendente:  {icon:"⏳", title:"Pagamento Pendente", badge:"⏳ Aguardando Confirmação", cls:"pendente", msg:"Seu pedido foi recebido! O pagamento está sendo processado. Você será notificado assim que for confirmado."},
  falhou:    {icon:"😕", title:"Pagamento não realizado", badge:"❌ Falha no Pagamento", cls:"falhou",  msg:"Houve um problema com seu pagamento. Por favor, tente novamente ou entre em contato com nosso suporte."},
};
const d = map[status] || map.pendente;
document.getElementById("icon").textContent = d.icon;
document.getElementById("title").textContent = d.title;
document.getElementById("badge").textContent = d.badge;
document.getElementById("badge").classList.add(d.cls);
document.getElementById("msg").textContent = d.msg;
</script>
</body>
</html>
